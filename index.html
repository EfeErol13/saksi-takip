<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pot-Tech Mobile | Üretim Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px; /* Alt menü için boşluk */
        }

        .mobile-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
        }

        .nav-button.active {
            color: #f59e0b;
        }

        .nav-button.active i {
            transform: translateY(-5px);
            color: #f59e0b;
        }

        input, select {
            font-size: 16px !important; /* iOS zoom engelleme */
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            color: white !important;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Mobilde tabloları kart görünümüne sokar */
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { 
                display: block; 
                margin-bottom: 1rem; 
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 1rem;
                background: rgba(255,255,255,0.03);
            }
            .responsive-table td { 
                display: flex; 
                justify-content: flex-end; 
                align-items: center;
                padding: 0.75rem;
                position: relative;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }
            .responsive-table td::before {
                content: attr(data-label);
                position: absolute;
                left: 1rem;
                font-weight: 600;
                font-size: 0.75rem;
                color: #94a3b8;
                text-transform: uppercase;
            }
        }
    </style>
</head>
<body class="p-4">

    <!-- ÜST BAR -->
    <header class="flex justify-between items-center mb-6 pt-2">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight">POT-TECH <span class="text-amber-500">PRO</span></h1>
            <p id="page-indicator" class="text-xs text-slate-400 font-medium uppercase">Reçete Merkezi</p>
        </div>
        <div class="bg-amber-500/10 text-amber-500 px-3 py-1 rounded-full text-[10px] font-bold border border-amber-500/20">
            AKTİF SİSTEM
        </div>
    </header>

    <!-- İÇERİK ALANLARI -->
    <main id="main-content">
        
        <!-- SEKMELER (Sadece biri görünür) -->
        
        <!-- 1. REÇETELER -->
        <div id="section-recete" class="tab-content space-y-4">
            <div id="mobile-recete-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <!-- 2. HESAPLAMA -->
        <div id="section-hesap" class="tab-content hidden space-y-4">
            <div class="mobile-card p-5">
                <h3 class="text-lg font-bold mb-4">Hızlı Hesapla</h3>
                <div class="space-y-4">
                    <select id="calc-color" class="w-full p-4 rounded-xl"></select>
                    <input type="number" id="calc-qty" placeholder="Adet Giriniz" class="w-full p-4 rounded-xl">
                    <button onclick="calculateBulk()" class="w-full bg-amber-500 text-slate-900 font-bold py-4 rounded-xl">HESAPLA</button>
                </div>
                <div id="calc-result" class="mt-6 grid grid-cols-2 gap-3 hidden">
                    <div class="bg-slate-900/50 p-3 rounded-lg border border-white/5">
                        <span class="text-[10px] text-slate-500 uppercase block">Harç</span>
                        <span id="res-harc" class="text-lg font-bold">0</span> <span class="text-xs text-slate-400">kg</span>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-lg border border-white/5">
                        <span class="text-[10px] text-slate-500 uppercase block">Pigment</span>
                        <span id="res-pigment" class="text-lg font-bold text-amber-500">0</span> <span class="text-xs text-slate-400">kg</span>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-lg border border-white/5">
                        <span class="text-[10px] text-slate-500 uppercase block">Akışkan.</span>
                        <span id="res-flow" class="text-lg font-bold">0</span> <span class="text-xs text-slate-400">kg</span>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-lg border border-white/5">
                        <span class="text-[10px] text-slate-500 uppercase block">Su</span>
                        <span id="res-water" class="text-lg font-bold text-blue-400">0</span> <span class="text-xs text-slate-400">L</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. SİPARİŞ VE ÜRETİM -->
        <div id="section-uretim" class="tab-content hidden space-y-6">
            <!-- Üretim Girişi -->
            <div class="mobile-card p-5 border-l-4 border-blue-500">
                <h3 class="font-bold mb-3">Üretim Bildir</h3>
                <div class="flex gap-2">
                    <select id="prod-color" class="flex-1 p-3 rounded-lg"></select>
                    <input type="number" id="prod-qty" placeholder="Adet" class="w-24 p-3 rounded-lg">
                    <button onclick="registerProduction()" class="bg-blue-600 p-3 rounded-lg"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <!-- Sipariş Ekleme -->
            <button onclick="toggleModal('order-modal')" class="w-full bg-slate-800 border border-white/10 py-4 rounded-xl font-bold">
                <i class="fa-solid fa-user-plus mr-2"></i> YENİ SİPARİŞ EKLE
            </button>
            <!-- Sipariş Listesi -->
            <div id="mobile-order-list" class="space-y-3"></div>
        </div>

        <!-- 4. FİNANS -->
        <div id="section-finans" class="tab-content hidden space-y-4">
            <div class="grid grid-cols-1 gap-3">
                <div class="mobile-card p-5 flex justify-between items-center">
                    <span class="text-sm text-slate-400">Toplam Ciro</span>
                    <span id="fin-rev" class="text-xl font-bold">0 TL</span>
                </div>
                <div class="mobile-card p-5 flex justify-between items-center">
                    <span class="text-sm text-slate-400">Hammadde Gideri</span>
                    <span id="fin-cost" class="text-xl font-bold text-red-400">0 TL</span>
                </div>
                <div class="mobile-card p-5 bg-emerald-500/10 border-emerald-500/20 flex justify-between items-center">
                    <span class="text-sm text-emerald-500 font-bold">Net Kar</span>
                    <span id="fin-prof" class="text-xl font-black text-emerald-400">0 TL</span>
                </div>
            </div>
            <!-- Maliyet Ayarları -->
            <div class="mobile-card p-5 space-y-3">
                <p class="text-xs font-bold text-slate-500 uppercase">KG Fiyat Güncelle</p>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="price-harc" placeholder="Harç" class="p-2 rounded text-xs">
                    <input type="number" id="price-pigment" placeholder="Boya" class="p-2 rounded text-xs">
                    <input type="number" id="price-flow" placeholder="Akış." class="p-2 rounded text-xs">
                </div>
                <button onclick="savePrices()" class="w-full py-2 bg-slate-700 rounded-lg text-xs font-bold uppercase">Fiyatları Kaydet</button>
            </div>
        </div>
    </main>

    <!-- ALT MOBİL MENÜ -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0f1d]/90 backdrop-blur-xl border-t border-white/5 px-6 py-3 flex justify-between items-center z-50 safe-area-bottom">
        <button onclick="changeTab('recete')" class="nav-button active flex flex-col items-center space-y-1 transition-all">
            <i class="fa-solid fa-flask-vial text-xl"></i>
            <span class="text-[10px] font-bold">Reçete</span>
        </button>
        <button onclick="changeTab('hesap')" class="nav-button flex flex-col items-center space-y-1 transition-all text-slate-500">
            <i class="fa-solid fa-calculator text-xl"></i>
            <span class="text-[10px] font-bold">Hesap</span>
        </button>
        <button onclick="changeTab('uretim')" class="nav-button flex flex-col items-center space-y-1 transition-all text-slate-500">
            <i class="fa-solid fa-industry text-xl"></i>
            <span class="text-[10px] font-bold">Üretim</span>
        </button>
        <button onclick="changeTab('finans')" class="nav-button flex flex-col items-center space-y-1 transition-all text-slate-500">
            <i class="fa-solid fa-chart-line text-xl"></i>
            <span class="text-[10px] font-bold">Finans</span>
        </button>
    </nav>

    <!-- MODAL: SİPARİŞ EKLE -->
    <div id="order-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="mobile-card bg-slate-900 w-full max-w-sm p-6 space-y-4">
            <h3 class="text-xl font-bold">Yeni Sipariş</h3>
            <input type="text" id="order-cust" placeholder="Müşteri Adı" class="w-full p-4 rounded-xl">
            <div class="flex gap-2">
                <select id="order-color" class="flex-1 p-4 rounded-xl"></select>
                <input type="number" id="order-qty" placeholder="Adet" class="w-24 p-4 rounded-xl">
            </div>
            <input type="number" id="order-price" placeholder="Birim Satış Fiyatı" class="w-full p-4 rounded-xl">
            <input type="date" id="order-date" class="w-full p-4 rounded-xl">
            <div class="flex gap-2 pt-2">
                <button onclick="toggleModal('order-modal')" class="flex-1 py-4 text-slate-400 font-bold">İPTAL</button>
                <button onclick="addOrder()" class="flex-1 py-4 bg-amber-500 text-slate-900 rounded-xl font-bold">KAYDET</button>
            </div>
        </div>
    </div>

    <script>
        // SİSTEM VERİLERİ
        const DEF_RECIPES = {
            siyah: { harc: 86, pigment: 0.04, flow: 0.5, water: 18, color: '#1e293b' },
            krem: { harc: 86, pigment: 0.02, flow: 0.5, water: 18, color: '#fef3c7' },
            sarı: { harc: 86, pigment: 0.04, flow: 0.5, water: 18, color: '#fbbf24' },
            turuncu: { harc: 88, pigment: 0.05, flow: 0.5, water: 19, color: '#f97316' },
            kırmızı: { harc: 90, pigment: 0.06, flow: 0.6, water: 20, color: '#dc2626' },
            mavi: { harc: 86, pigment: 0.04, flow: 0.5, water: 18, color: '#2563eb' }
        };

        let recipes = JSON.parse(localStorage.getItem('m_recipes')) || DEF_RECIPES;
        let prices = JSON.parse(localStorage.getItem('m_prices')) || { harc: 15, pigment: 300, flow: 150 };
        let orders = JSON.parse(localStorage.getItem('m_orders')) || [];

        // BAŞLATMA
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

        function initApp() {
            renderRecipes();
            populateSelects();
            renderOrders();
            renderFinances();
            document.getElementById('price-harc').value = prices.harc;
            document.getElementById('price-pigment').value = prices.pigment;
            document.getElementById('price-flow').value = prices.flow;
        }

        // SEKMELER
        function changeTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('section-' + tab).classList.remove('hidden');
            
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active', 'text-amber-500'));
            event.currentTarget.classList.add('active');

            const labels = { recete: 'Reçete Merkezi', hesap: 'Malzeme Hesaplama', uretim: 'Sipariş & Üretim', finans: 'Finansal Durum' };
            document.getElementById('page-indicator').innerText = labels[tab];
        }

        // REÇETELERİ LİSTELE
        function renderRecipes() {
            const container = document.getElementById('mobile-recete-list');
            container.innerHTML = '';
            Object.entries(recipes).forEach(([name, r]) => {
                container.innerHTML += `
                    <div class="mobile-card p-4">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full" style="background:${r.color}"></div>
                                <span class="font-bold capitalize">${name}</span>
                            </div>
                            <span class="text-[10px] text-slate-500">1 ADET İÇİN</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="flex flex-col">
                                <label class="text-[10px] text-slate-500 uppercase">Harç (gr)</label>
                                <input type="number" step="0.1" value="${r.harc}" onchange="updateRecipe('${name}','harc',this.value)" class="p-2 rounded-lg text-sm">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-[10px] text-slate-500 uppercase">Boya (gr)</label>
                                <input type="number" step="0.001" value="${r.pigment}" onchange="updateRecipe('${name}','pigment',this.value)" class="p-2 rounded-lg text-sm">
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateRecipe(name, key, val) {
            recipes[name][key] = parseFloat(val);
            localStorage.setItem('m_recipes', JSON.stringify(recipes));
        }

        // HESAPLAMA
        function calculateBulk() {
            const color = document.getElementById('calc-color').value;
            const qty = parseInt(document.getElementById('calc-qty').value);
            if(!qty) return;
            const r = recipes[color];
            document.getElementById('res-harc').innerText = ((r.harc * qty) / 1000).toFixed(1);
            document.getElementById('res-pigment').innerText = ((r.pigment * qty) / 1000).toFixed(2);
            document.getElementById('res-flow').innerText = ((r.flow * qty) / 1000).toFixed(1);
            document.getElementById('res-water').innerText = ((r.water * qty) / 1000).toFixed(0);
            document.getElementById('calc-result').classList.remove('hidden');
        }

        // SİPARİŞ & ÜRETİM
        function addOrder() {
            const cust = document.getElementById('order-cust').value;
            const color = document.getElementById('order-color').value;
            const qty = parseInt(document.getElementById('order-qty').value);
            const price = parseFloat(document.getElementById('order-price').value);
            const date = document.getElementById('order-date').value;

            if(!cust || !qty) return;

            orders.push({ id: Date.now(), cust, color, qty, remaining: qty, price, date });
            saveAndRefresh();
            toggleModal('order-modal');
        }

        function renderOrders() {
            const container = document.getElementById('mobile-order-list');
            container.innerHTML = '<h3 class="text-xs font-bold text-slate-500 uppercase px-1">Aktif Siparişler</h3>';
            orders.forEach(o => {
                const progress = ((o.qty - o.remaining) / o.qty) * 100;
                container.innerHTML += `
                    <div class="mobile-card p-4 relative overflow-hidden">
                        <div class="absolute top-0 left-0 h-1 bg-amber-500" style="width: ${progress}%"></div>
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold">${o.cust}</p>
                                <p class="text-xs text-slate-400 capitalize">${o.color} - ${o.qty} Adet</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold ${o.remaining === 0 ? 'text-emerald-500' : 'text-amber-500'}">${o.remaining} KALAN</p>
                                <button onclick="deleteOrder(${o.id})" class="text-slate-600 text-xs mt-2"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function registerProduction() {
            const color = document.getElementById('prod-color').value;
            let qty = parseInt(document.getElementById('prod-qty').value);
            if(!qty) return;

            orders.filter(o => o.color === color && o.remaining > 0)
                  .sort((a,b) => new Date(a.date) - new Date(b.date))
                  .forEach(o => {
                      if(qty <= 0) return;
                      const take = Math.min(o.remaining, qty);
                      o.remaining -= take;
                      qty -= take;
                  });

            saveAndRefresh();
            document.getElementById('prod-qty').value = '';
            alert("Üretim işlendi.");
        }

        // FİNANS
        function renderFinances() {
            let rev = 0; let cost = 0;
            orders.forEach(o => {
                const r = recipes[o.color];
                rev += (o.qty * o.price);
                cost += (((r.harc * o.qty)/1000)*prices.harc) + (((r.pigment * o.qty)/1000)*prices.pigment);
            });
            document.getElementById('fin-rev').innerText = rev.toLocaleString() + " TL";
            document.getElementById('fin-cost').innerText = cost.toLocaleString() + " TL";
            document.getElementById('fin-prof').innerText = (rev - cost).toLocaleString() + " TL";
        }

        function savePrices() {
            prices.harc = parseFloat(document.getElementById('price-harc').value);
            prices.pigment = parseFloat(document.getElementById('price-pigment').value);
            prices.flow = parseFloat(document.getElementById('price-flow').value);
            localStorage.setItem('m_prices', JSON.stringify(prices));
            renderFinances();
            alert("Fiyatlar güncellendi.");
        }

        // YARDIMCILAR
        function saveAndRefresh() {
            localStorage.setItem('m_orders', JSON.stringify(orders));
            renderOrders();
            renderFinances();
        }

        function deleteOrder(id) {
            if(confirm('Silinsin mi?')) {
                orders = orders.filter(o => o.id !== id);
                saveAndRefresh();
            }
        }

        function populateSelects() {
            const opts = Object.keys(recipes).map(r => `<option value="${r}">${r.toUpperCase()}</option>`).join('');
            ['calc-color', 'order-color', 'prod-color'].forEach(id => document.getElementById(id).innerHTML = opts);
        }

        function toggleModal(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
